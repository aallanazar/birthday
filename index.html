<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday ✨</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --ink: #0d0b1a;
      --deep: #110e2a;
      --glow: #c9a5f7;
      --moon: #ffe9a0;
      --bloom: #ff8db8;
      --leaf: #72f7b0;
      --mist: #a8c4ff;
      --white: #f5f0ff;
      --dim: rgba(201, 165, 247, .12);
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: var(--ink);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      cursor: none
    }

    /* ── custom cursor ── */
    #cur {
      position: fixed;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--glow);
      pointer-events: none;
      z-index: 99999;
      transform: translate(-50%, -50%);
      mix-blend-mode: screen;
      transition: transform .08s, width .2s, height .2s;
      box-shadow: 0 0 14px var(--glow)
    }

    #cur2 {
      position: fixed;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(201, 165, 247, .4);
      pointer-events: none;
      z-index: 99998;
      transform: translate(-50%, -50%);
      transition: left .12s, top .12s
    }

    /* ── canvas for stars ── */
    #starCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none
    }

    /* ── views ── */
    .view {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .8s ease;
      z-index: 1
    }

    .view.active {
      opacity: 1;
      pointer-events: all
    }

    /* ══════════════════════════════════════════
   VIEW 1
══════════════════════════════════════════ */
    #v1 {
      background: radial-gradient(ellipse 80% 80% at 50% 60%, #1a1040 0%, var(--ink) 100%)
    }

    .moon-deco {
      position: absolute;
      top: -60px;
      right: -60px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #ffe9a0 0%, #ffbe3d 40%, transparent 70%);
      opacity: .18;
      filter: blur(2px);
      pointer-events: none
    }

    /* floating botanical SVG sprites */
    .bota {
      position: absolute;
      pointer-events: none;
      opacity: .55;
      animation: sway 6s ease-in-out infinite
    }

    @keyframes sway {

      0%,
      100% {
        transform: rotate(-4deg) scale(1)
      }

      50% {
        transform: rotate(4deg) scale(1.04)
      }
    }

    .v1-content {
      z-index: 2;
      text-align: center;
      padding: 2rem;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center
    }

    .v1-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 9vw, 5.5rem);
      font-weight: 600;
      line-height: 1.05;
      color: var(--white);
      margin-bottom: .6rem;
      opacity: 0;
      animation: fadeUp .9s .5s forwards
    }

    .v1-title em {
      color: var(--glow);
      font-style: italic
    }

    .v1-sub {
      font-size: clamp(.9rem, 2vw, 1.05rem);
      font-weight: 300;
      color: rgba(245, 240, 255, .6);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp .9s .75s forwards
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(22px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    /* btn yes */
    #btnYes {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      padding: 1rem 2.4rem;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #a267f5, #ff6fa8);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: .06em;
      cursor: none;
      box-shadow: 0 0 40px rgba(162, 103, 245, .5), 0 0 80px rgba(255, 111, 168, .2);
      opacity: 0;
      animation: fadeUp .9s 1s forwards;
      transition: transform .15s, box-shadow .15s
    }

    #btnYes:hover {
      transform: scale(1.06);
      box-shadow: 0 0 60px rgba(162, 103, 245, .7), 0 0 120px rgba(255, 111, 168, .3)
    }

    /* View 2 specific styling */
    .question-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 7vw, 3.2rem);
      font-weight: 600;
      margin-bottom: 2.5rem;
      text-align: center;
      color: var(--white);
    }

    .btn-container {
      display: flex;
      justify-content: center;
      gap: 24px;
      align-items: center;
      min-height: 100px;
      position: relative;
      width: 100%;
    }

    .btn-yes2 {
      padding: 1rem 2.4rem;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #44bb44, #228822);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      cursor: none;
      box-shadow: 0 0 30px rgba(68, 187, 68, 0.4);
      transition: transform .15s, box-shadow .15s;
    }

    .btn-yes2:hover {
      transform: scale(1.06);
      box-shadow: 0 0 50px rgba(68, 187, 68, 0.6);
    }

    .btn-no2 {
      padding: 1rem 2.4rem;
      border-radius: 50px;
      border: none;
      background: linear-gradient(135deg, #ff5555, #cc2222);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1.15rem;
      font-weight: 500;
      cursor: none;
      box-shadow: 0 0 30px rgba(255, 85, 85, 0.4);
      transition: transform .15s, box-shadow .15s;
      z-index: 10;
    }

    .btn-no2:hover {
      transform: scale(1.06);
      box-shadow: 0 0 50px rgba(255, 85, 85, 0.6);
    }

    /* ══════════════════════════════════════════
   TRANSITION
══════════════════════════════════════════ */
    #trans {
      background: var(--ink);
      z-index: 200
    }

    .trans-ripple {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--rx, 50%) var(--ry, 50%), #a267f5 0%, transparent 60%);
      opacity: 0;
      transition: opacity .5s
    }

    .cat-wrap {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: -20%;
      display: flex;
      align-items: center;
      gap: .5rem;
      animation: none;
      white-space: nowrap
    }

    .cat-emoji {
      font-size: clamp(3.5rem, 14vw, 7rem);
      display: inline-block;
      animation: catBob .35s ease-in-out infinite alternate
    }

    @keyframes catBob {
      from {
        transform: translateY(0) scaleX(1)
      }

      to {
        transform: translateY(-8px) scaleX(1.04)
      }
    }

    @keyframes catRun {
      0% {
        left: -20%
      }

      100% {
        left: 115%
      }
    }

    .paw-trail {
      position: absolute;
      top: calc(50% + 42px);
      left: 0;
      display: flex;
      gap: clamp(18px, 4vw, 36px);
      animation: none;
      white-space: nowrap
    }

    @keyframes pawRun {
      0% {
        left: -30%
      }

      100% {
        left: 120%
      }
    }

    .trans-label {
      position: absolute;
      bottom: 22%;
      width: 100%;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.1rem, 3vw, 1.8rem);
      color: var(--glow);
      opacity: 0;
      transition: opacity 1.2s
    }

    /* ══════════════════════════════════════════
   VIEW 2
══════════════════════════════════════════ */
    #v2,
    #v3 {
      background: radial-gradient(ellipse 100% 80% at 20% 80%, #0f1f35 0%, var(--ink) 70%);
      overflow-y: auto;
      align-items: center;
      padding: 3rem 1.2rem 4rem
    }

    .v2-inner {
      max-width: 640px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem
    }

    /* ghost cat */
    #ghostCat {
      width: clamp(140px, 38vw, 220px);
      border-radius: 24px;
      box-shadow: 0 0 60px rgba(201, 165, 247, .3), 0 0 120px rgba(201, 165, 247, .12);
      opacity: 1;
      transition: opacity 2.5s ease;
      object-fit: cover;
      border: 1px solid rgba(201, 165, 247, .2)
    }

    /* typewriter */
    #twBox {
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 2.8vw, 1.4rem);
      font-weight: 300;
      line-height: 1.9;
      color: var(--white);
      text-align: center;
      max-width: 560px;
      white-space: pre-wrap
    }

    #twText em {
      color: var(--glow);
      font-style: italic
    }

    #caret {
      display: inline-block;
      width: 2px;
      height: 1.15em;
      background: var(--glow);
      margin-left: 2px;
      vertical-align: middle;
      animation: caretBlink .65s step-end infinite
    }

    @keyframes caretBlink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* restart button */
    .btn-restart {
      background: transparent;
      border: 1px solid var(--glow);
      color: var(--glow);
      padding: 10px 24px;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: none;
      margin-top: 1.5rem;
      transition: all 0.2s;
      box-shadow: 0 0 20px rgba(201, 165, 247, 0.1);
    }

    .btn-restart:hover {
      background: rgba(201, 165, 247, 0.15);
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(201, 165, 247, 0.3);
    }

    /* continue button */
    #btnContinue {
      padding: 1rem 2rem;
      border: 1px solid rgba(201, 165, 247, .4);
      border-radius: 50px;
      background: rgba(201, 165, 247, .08);
      color: var(--glow);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: .06em;
      cursor: none;
      margin-top: 1.5rem;
      display: none;
      transition: all .2s;
      box-shadow: 0 0 30px rgba(201, 165, 247, .2);
    }

    #btnContinue:hover {
      background: rgba(201, 165, 247, .15);
      transform: scale(1.05);
      box-shadow: 0 0 50px rgba(201, 165, 247, .4);
    }

    /* ══════════════════════════════════════════
   VIEW 3
══════════════════════════════════════════ */
    #v3,
    #v4 {
      background: radial-gradient(ellipse 100% 100% at 50% 50%, #130929 0%, var(--ink) 80%);
      overflow: hidden
    }

    /* particle confetti */
    .cp {
      position: absolute;
      top: -16px;
      border-radius: 2px;
      animation: cpFall linear infinite;
      pointer-events: none
    }

    @keyframes cpFall {
      0% {
        transform: translateY(0) rotate(0) scale(1);
        opacity: .9
      }

      100% {
        transform: translateY(110vh) rotate(900deg) scale(.4);
        opacity: 0
      }
    }

    .v3-inner,
    .v4-inner {
      z-index: 2;
      text-align: center;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
      opacity: 0;
      animation: fadeUp 1s .3s forwards
    }

    .v3-inner h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 7vw, 3.8rem);
      font-weight: 600;
      color: var(--white)
    }

    .v3-inner h2 span {
      color: var(--glow);
      font-style: italic
    }

    .v3-inner p {
      font-size: clamp(.9rem, 2.2vw, 1.1rem);
      font-weight: 300;
      color: rgba(245, 240, 255, .65);
      max-width: 440px;
      line-height: 1.8
    }

    .emoji-row {
      font-size: 2rem;
      letter-spacing: .18em;
      margin-top: .3rem;
      animation: pulse 2s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.08)
      }
    }

    /* animated SVG flower */
    .flower-stage {
      position: relative;
      width: 220px;
      height: 240px
    }

    .petal {
      transform-origin: 50% 100%;
      animation: petalBloom 1.2s cubic-bezier(.4, 0, .2, 1) forwards;
      opacity: 0
    }

    @keyframes petalBloom {
      from {
        transform: rotate(var(--r)) scaleY(0);
        opacity: 0
      }

      to {
        transform: rotate(var(--r)) scaleY(1);
        opacity: 1
      }
    }

    .stem-line {
      stroke-dasharray: 120;
      stroke-dashoffset: 120;
      animation: drawStem 1s .2s forwards ease-out
    }

    @keyframes drawStem {
      to {
        stroke-dashoffset: 0
      }
    }

    .leaf-path {
      opacity: 0;
      animation: leafIn .6s 1s forwards
    }

    @keyframes leafIn {
      to {
        opacity: .9
      }
    }

    /* firefly dots */
    .ff {
      position: absolute;
      border-radius: 50%;
      background: var(--leaf);
      pointer-events: none;
      animation: ffFloat ease-in-out infinite, ffFade ease-in-out infinite
    }

    @keyframes ffFloat {

      0%,
      100% {
        transform: translate(0, 0)
      }

      50% {
        transform: translate(var(--dx), var(--dy))
      }
    }

    @keyframes ffFade {

      0%,
      100% {
        opacity: .1
      }

      50% {
        opacity: .75
      }
    }

    /* sparkle particle */
    .sparkle {
      position: fixed;
      pointer-events: none;
      z-index: 99998;
      border-radius: 50%;
      animation: spkl .55s ease-out forwards
    }

    @keyframes spkl {
      0% {
        transform: scale(1.5);
        opacity: .9
      }

      100% {
        transform: scale(0) translateY(-24px);
        opacity: 0
      }
    }
  </style>
</head>

<body>

  <canvas id="starCanvas"></canvas>
  <div id="cur"></div>
  <div id="cur2"></div>

  <!-- ══ VIEW 1 ══ -->
  <div id="v1" class="view active">
    <div class="moon-deco"></div>

    <!-- botanical SVG left -->
    <svg class="bota" style="left:-30px;bottom:10%;width:clamp(90px,18vw,160px);animation-delay:0s"
      viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg" fill="none">
      <path d="M60 200 C60 160 55 100 60 60" stroke="#72f7b0" stroke-width="2.5" stroke-linecap="round" />
      <path d="M60 140 C35 125 20 100 40 88 C50 112 56 128 60 140Z" fill="#72f7b0" opacity=".7" />
      <path d="M60 110 C85 95 100 68 78 58 C70 82 64 96 60 110Z" fill="#a8c4ff" opacity=".55" />
      <circle cx="60" cy="55" r="18" fill="#ff8db8" opacity=".8" />
      <circle cx="60" cy="55" r="11" fill="#ffe9a0" opacity=".9" />
      <circle cx="60" cy="55" r="5" fill="#ff8db8" />
    </svg>

    <!-- botanical SVG right -->
    <svg class="bota" style="right:-20px;top:8%;width:clamp(80px,15vw,130px);animation-delay:1.5s" viewBox="0 0 100 180"
      xmlns="http://www.w3.org/2000/svg" fill="none">
      <path d="M50 180 C50 140 45 90 50 50" stroke="#a8c4ff" stroke-width="2" stroke-linecap="round" />
      <path d="M50 130 C28 115 14 90 36 80 C44 102 48 118 50 130Z" fill="#c9a5f7" opacity=".6" />
      <ellipse cx="50" cy="48" rx="16" ry="16" fill="#ffe9a0" opacity=".75" />
      <circle cx="50" cy="48" r="8" fill="#c9a5f7" opacity=".9" />
    </svg>

    <div class="v1-content">
      <h1 class="v1-title">Happy<br><em>Birthday</em></h1>
      <p class="v1-sub">Something magical is waiting for you.<br>Are you ready to step through? ✨</p>
      <button id="btnYes">✨ Open the magic &rarr;</button>
    </div>
  </div>

  <!-- ══ VIEW 2 - QUESTION ══ -->
  <div id="v2" class="view">
    <div class="v2-inner">
      <h2 class="question-title">Möchtest du etwas von mir hören?</h2>
      <div class="btn-container">
        <button id="btnYes2" class="btn-yes2">Yes! 🎉</button>
        <button id="btnNo2" class="btn-no2">No</button>
      </div>
    </div>
  </div>

  <!-- ══ TRANSITION ══ -->
  <div id="trans" class="view">
    <div class="trans-ripple" id="tRipple"></div>
    <div class="cat-wrap" id="catWrap">
      <span class="cat-emoji">🐈‍⬛</span>
    </div>
    <div class="paw-trail" id="pawTrail">
      <span>🐾</span><span>🐾</span><span>🐾</span><span>🐾</span>
      <span>🐾</span><span>🐾</span><span>🐾</span><span>🐾</span>
    </div>
    <p class="trans-label" id="tLabel">a little cat is clearing the path for you…</p>
  </div>

  <!-- ══ VIEW 3 - TYPEWRITER MESSAGE ══ -->
  <div id="v3" class="view">
    <div class="v2-inner">
      <h2 class="v3-title"
        style="font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,8vw,3.6rem);font-weight:600;margin-bottom:1rem;background:linear-gradient(45deg,#ff79c6,#bd93f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;">
        Ich wusste es! ❤️</h2>
      <img id="ghostCat" src="katze-neu.jpg" onerror="this.src='https://placecats.com/neo/300/240'"
        alt="My favourite cat">
      <div id="twBox"><span id="twText"></span><span id="caret"></span></div>
      <button id="btnContinue">Weiter &rarr;</button>
    </div>
  </div>

  <!-- ══ VIEW 4 - THANK YOU ══ -->
  <div id="v4" class="view">
    <div class="v3-inner">
      <!-- animated SVG flower -->
      <div class="flower-stage">
        <svg width="220" height="240" viewBox="0 0 220 240" xmlns="http://www.w3.org/2000/svg">
          <!-- stem -->
          <path class="stem-line" d="M110 230 C110 200 100 170 110 140" stroke="#72f7b0" stroke-width="4" fill="none"
            stroke-linecap="round" />
          <!-- leaf -->
          <path class="leaf-path" d="M110 182 C80 168 62 142 86 130 C98 154 106 170 110 182Z" fill="#72f7b0" />
          <!-- petals — 10 petals with staggered delay -->
          <g transform="translate(110,108)">
            <ellipse class="petal" style="--r:0deg;  animation-delay:.5s" cx="0" cy="-44" rx="13" ry="26" fill="#ff8db8"
              opacity=".92" />
            <ellipse class="petal" style="--r:36deg; animation-delay:.62s" cx="0" cy="-44" rx="13" ry="26"
              fill="#c9a5f7" opacity=".88" />
            <ellipse class="petal" style="--r:72deg; animation-delay:.74s" cx="0" cy="-44" rx="13" ry="26"
              fill="#ff8db8" opacity=".92" />
            <ellipse class="petal" style="--r:108deg;animation-delay:.86s" cx="0" cy="-44" rx="13" ry="26"
              fill="#ffe9a0" opacity=".85" />
            <ellipse class="petal" style="--r:144deg;animation-delay:.98s" cx="0" cy="-44" rx="13" ry="26"
              fill="#ff8db8" opacity=".92" />
            <ellipse class="petal" style="--r:180deg;animation-delay:1.1s" cx="0" cy="-44" rx="13" ry="26"
              fill="#c9a5f7" opacity=".88" />
            <ellipse class="petal" style="--r:216deg;animation-delay:1.22s" cx="0" cy="-44" rx="13" ry="26"
              fill="#ff8db8" opacity=".92" />
            <ellipse class="petal" style="--r:252deg;animation-delay:1.34s" cx="0" cy="-44" rx="13" ry="26"
              fill="#ffe9a0" opacity=".85" />
            <ellipse class="petal" style="--r:288deg;animation-delay:1.46s" cx="0" cy="-44" rx="13" ry="26"
              fill="#ff8db8" opacity=".92" />
            <ellipse class="petal" style="--r:324deg;animation-delay:1.58s" cx="0" cy="-44" rx="13" ry="26"
              fill="#c9a5f7" opacity=".88" />
            <!-- centre -->
            <circle cx="0" cy="0" r="24" fill="#ffe9a0" />
            <circle cx="0" cy="0" r="16" fill="#ff8db8" opacity=".8" />
            <circle cx="0" cy="0" r="8" fill="#ffe9a0" />
            <!-- glow ring -->
            <circle cx="0" cy="0" r="30" fill="none" stroke="#ffe9a0" stroke-width="1" opacity=".4" />
          </g>
        </svg>
      </div>

      <h2>Schön, dass es dich gibt! 🎂</h2>
      <p>Genieße deinen Tag in vollen Zügen!</p>
      <div style="display:none;" id="v4name"></div>
      <button id="btnRestart" class="btn-restart">Nochmal von vorn ✨</button>
      <div class="emoji-row">🎂 🎈 ✨ 🌸 🎁</div>
    </div>
  </div>

  <script>
    /* ── CURSOR ── */
    const cur = document.getElementById('cur');
    const cur2 = document.getElementById('cur2');
    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cur.style.left = mx + 'px'; cur.style.top = my + 'px';
    });
    setInterval(() => { cur2.style.left = mx + 'px'; cur2.style.top = my + 'px'; }, 60);

    /* ── STARS ── */
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initStars() }
    function initStars() {
      stars = [];
      for (let i = 0; i < 180; i++) {
        stars.push({
          x: Math.random() * canvas.width, y: Math.random() * canvas.height,
          r: Math.random() * 1.4 + .2, a: Math.random(), da: (Math.random() - .5) * .006 + .002
        })
      }
    }
    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.a += s.da; if (s.a > 1 || s.a < 0) s.da *= -1;
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(201,165,247,${s.a.toFixed(2)})`; ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    resizeCanvas(); drawStars();
    window.addEventListener('resize', resizeCanvas);

    /* ── SPARKLE TRAIL ── */
    const spkColors = ['#c9a5f7', '#ff8db8', '#ffe9a0', '#72f7b0', '#a8c4ff'];
    document.addEventListener('mousemove', e => {
      const av = document.querySelector('.view.active');
      if (!av || (av.id !== 'v1' && av.id !== 'v3')) return;
      if (Math.random() > .3) return;
      const sp = document.createElement('div');
      sp.className = 'sparkle';
      const sz = Math.random() * 7 + 4;
      sp.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX}px;top:${e.clientY}px;
    background:${spkColors[Math.floor(Math.random() * spkColors.length)]};
    box-shadow:0 0 8px ${spkColors[0]}`;
      document.body.appendChild(sp);
      setTimeout(() => sp.remove(), 600);
    });

    /* ── VIEWS ── */
    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    /* ── FLEEING BUTTON ── */
    const btnNo2 = document.getElementById('btnNo2');
    function fleeNo2(e) {
      btnNo2.style.position = 'fixed';
      const bw = btnNo2.offsetWidth || 120;
      const bh = btnNo2.offsetHeight || 44;
      const m = 40;
      const nx = Math.random() * (window.innerWidth - bw - m) + m;
      const ny = Math.random() * (window.innerHeight - bh - m) + m;
      btnNo2.style.left = nx + 'px';
      btnNo2.style.top = ny + 'px';
      btnNo2.style.transform = 'none';
      if (e) e.preventDefault();
    }
    if (btnNo2) {
      btnNo2.addEventListener('mouseenter', fleeNo2);
      btnNo2.addEventListener('touchstart', fleeNo2, { passive: false });
      btnNo2.addEventListener('click', e => { e.preventDefault(); fleeNo2(e); });
    }

    /* ── TRANSITION START FROM PAGE 1 TO PAGE 2 ── */
    document.getElementById('btnYes').addEventListener('click', () => {
      showView('v2');
    });

    /* ── TRANSITION START FROM PAGE 2 TO PAGE 3 ── */
    document.getElementById('btnYes2').addEventListener('click', () => {
      window._bdName = 'aallanazar';
      window._bdText = `Happy Birthday. 🌙

On this day the universe did something wonderful —
it brought you into existence,
and everything has been brighter ever since.

You are rare and radiant.
You carry warmth in your laugh,
magic in the way you see the world,
and kindness that makes people feel less alone.

I hope this year gives you
all the wonder you so freely give to others.

With all my love ✦`;

      showView('trans');
      const ripple = document.getElementById('tRipple');
      const catWrap = document.getElementById('catWrap');
      const pawTrail = document.getElementById('pawTrail');
      const label = document.getElementById('tLabel');

      // Reset animations
      catWrap.style.animation = 'none';
      pawTrail.style.animation = 'none';
      catWrap.offsetHeight; // Force reflow
      pawTrail.offsetHeight; // Force reflow

      setTimeout(() => { ripple.style.opacity = '1'; }, 100);
      setTimeout(() => { ripple.style.opacity = '0'; }, 600);

      setTimeout(() => {
        label.style.opacity = '1';
        const dur = '2.4s';
        catWrap.style.animation = `catRun ${dur} cubic-bezier(.3,0,.7,1) forwards`;
        pawTrail.style.animation = `pawRun ${dur} cubic-bezier(.3,0,.7,1) forwards`;
      }, 400);

      setTimeout(() => {
        showView('v3');
        startV3();
      }, 3200);
    });

    /* ── VIEW 3 - TYPEWRITER ── */
    function startV3() {
      const ghost = document.getElementById('ghostCat');
      const twBox = document.getElementById('twBox');
      const twText = document.getElementById('twText');
      const btnContinue = document.getElementById('btnContinue');
      const caret = document.getElementById('caret');

      if (ghost) {
        ghost.style.opacity = '1';
        ghost.style.display = 'block';
      }
      if (twBox) twBox.style.display = 'none';
      if (twText) twText.textContent = '';
      if (btnContinue) btnContinue.style.display = 'none';
      if (caret) caret.style.display = 'inline-block';

      // Add fireflies to v3
      const v3 = document.getElementById('v3');
      if (v3) {
        v3.querySelectorAll('.ff').forEach(f => f.remove());
        for (let i = 0; i < 12; i++) {
          const ff = document.createElement('div');
          ff.className = 'ff';
          const sz = Math.random() * 4 + 2;
          ff.style.cssText = `width:${sz}px;height:${sz}px;
        left:${Math.random() * 100}%;top:${Math.random() * 100}%;
        --dx:${(Math.random() - 0.5) * 40}px;--dy:${(Math.random() - 0.5) * 40}px;
        animation-duration:${3 + Math.random() * 4}s,${2 + Math.random() * 3}s;
        animation-delay:${Math.random() * 3}s,${Math.random() * 2}s;
        box-shadow:0 0 6px var(--leaf);position:absolute`;
          v3.appendChild(ff);
        }
      }

      setTimeout(() => {
        if (ghost) ghost.style.opacity = '0';
        setTimeout(() => {
          if (ghost) ghost.style.display = 'none';
          if (twBox) twBox.style.display = 'block';
          typewrite(window._bdText || 'Happy Birthday! ✦', twText, () => {
            if (caret) caret.style.display = 'none';
            if (btnContinue) {
              btnContinue.style.display = 'block';
              btnContinue.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
          });
        }, 2600);
      }, 2800);
    }

    /* ── CONTINUE BUTTON ── */
    document.getElementById('btnContinue').addEventListener('click', () => {
      showView('v4');
      startV4();
    });

    function typewrite(text, el, done) {
      let i = 0;
      (function tick() {
        if (i < text.length) {
          el.textContent += text[i++];
          setTimeout(tick, 22);
        } else {
          done && done();
        }
      })();
    }

    /* ── RESTART BUTTON → V1 ── */
    document.getElementById('btnRestart').addEventListener('click', () => {
      if (btnNo2) {
        btnNo2.style.position = 'relative';
        btnNo2.style.left = 'auto';
        btnNo2.style.top = 'auto';
        btnNo2.style.transform = 'none';
      }
      showView('v1');
    });

    /* ── VIEW 4 - THANK YOU ── */
    function startV4() {
      const nameEl = document.getElementById('v4name');
      if (nameEl && window._bdName) nameEl.textContent = window._bdName;
      const v4 = document.getElementById('v4');
      if (v4) {
        v4.querySelectorAll('.cp').forEach(c => c.remove());
        const colors = ['#c9a5f7', '#ff8db8', '#ffe9a0', '#72f7b0', '#a8c4ff', '#fff'];
        for (let i = 0; i < 70; i++) {
          const el = document.createElement('div');
          el.className = 'cp';
          const sz = Math.random() * 9 + 5;
          el.style.cssText = `left:${Math.random() * 100}vw;
        width:${sz}px;height:${sz + 4}px;
        background:${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration:${2.5 + Math.random() * 4}s;
        animation-delay:${Math.random() * 5}s;
        border-radius:${Math.random() > .5 ? '50%' : '3px'}`;
          v4.insertBefore(el, v4.firstChild);
        }
        // Add fireflies to v4
        for (let i = 0; i < 16; i++) {
          const ff = document.createElement('div');
          ff.className = 'ff';
          const sz = Math.random() * 4 + 2;
          ff.style.cssText = `width:${sz}px;height:${sz}px;
        left:${Math.random() * 100}%;top:${Math.random() * 100}%;
        --dx:${(Math.random() - 0.5) * 60}px;--dy:${(Math.random() - 0.5) * 60}px;
        animation-duration:${3 + Math.random() * 5}s,${2 + Math.random() * 4}s;
        animation-delay:${Math.random() * 4}s,${Math.random() * 3}s;
        box-shadow:0 0 8px var(--leaf);position:absolute`;
          v4.appendChild(ff);
        }
      }
    }
  </script>
</body>

</html>
